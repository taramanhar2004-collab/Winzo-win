<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tiranga Pro Ultra | Next-Gen Gaming Platform</title>
    <!-- Firebase v8 SDKs - CORRECT ORDER and with auth/database -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <!-- Font Awesome 6 Free CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        :root {
            --bg-dark: #0A0E1A;
            --bg-card: rgba(18, 24, 38, 0.85);
            --primary: #FF6B35;
            --primary-glow: #FF6B3580;
            --secondary: #00C853;
            --gold: #FFD700;
            --gold-glow: #FFD70040;
            --text-light: #F0F3FA;
            --text-muted: #8E96B0;
            --glass-border: rgba(255, 255, 255, 0.08);
            --danger: #FF3B5C;
            --warning: #FFB444;
            --success: #00E676;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #12182A, #0A0E1A);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track { background: #1E2438; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .animate-card {
            animation: fadeSlideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #E85D2C);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(255, 107, 53, 0.3);
        }
        .btn-primary:active { transform: scale(0.96); }
        .vip-badge {
            background: linear-gradient(135deg, var(--gold), #E6B800);
            color: #0A0E1A;
            font-weight: bold;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.7rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 20px;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 0.7rem;
            transition: 0.2s;
            cursor: pointer;
        }
        .nav-item.active { color: var(--primary); transform: translateY(-4px); }
        .nav-item i { font-size: 1.6rem; }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 16px 20px;
        }

        .marquee {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            animation: scrollText 10s linear infinite;
        }
        @keyframes scrollText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .banner-slide {
            background: linear-gradient(120deg, #1F2A48, #0F172A);
            border-radius: 28px;
            padding: 18px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
            margin: 16px 0;
        }
        .game-card {
            background: rgba(28, 36, 56, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 16px 8px;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid rgba(255,107,53,0.2);
            cursor: pointer;
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary);}
        .game-card i { font-size: 2.5rem; color: var(--primary);}
        
        .balance-chip {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .modal-overlay {
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            width: 90%;
            max-width: 400px;
            background: #12182E;
            border-radius: 32px;
            padding: 24px;
        }
        .hide { display: none; }

        .rank-table td { padding: 8px 4px; border-bottom: 1px solid #1E2740;}
        
        .stat-card {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }
        
        @media (max-width: 500px) { .game-grid { grid-template-columns: 1fr 1fr; } }
        
        .bet-panel {
            margin-top: 16px;
            padding: 16px;
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
        }
        .amount-btn {
            background: #1E2740;
            padding: 8px 16px;
            border-radius: 30px;
            display: inline-block;
            margin: 4px;
            cursor: pointer;
        }
        input, button { font-family: inherit; }
        .toast-msg {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E2A3A;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 1100;
            font-size: 0.8rem;
        }
        .bet-input {
            background: #1E2438;
            border: 1px solid #2a3450;
            border-radius: 40px;
            padding: 12px 16px;
            color: white;
            width: 100%;
            margin: 8px 0;
        }
        .result-win {
            color: var(--success);
            font-weight: bold;
        }
        .result-lose {
            color: var(--danger);
        }
    </style>
</head>
<body>
<div id="appRoot"></div>

<script>
    // ========== FIREBASE CONFIG (EXACT DATABASE URL) ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDummyKeyForDemoPurposesOnlyDoNotUse",   // Note: Firebase RTDB can work without apiKey if rules allow public? But we add placeholder to avoid missing error.
        authDomain: "admin-ff5c3.firebaseapp.com",
        databaseURL: "https://admin-ff5c3-default-rtdb.firebaseio.com/",
        projectId: "admin-ff5c3",
        storageBucket: "admin-ff5c3.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcd1234"
    };
    
    // Initialize Firebase (if not already)
    if (!firebase.apps.length) {
        try {
            firebase.initializeApp(firebaseConfig);
            console.log("Firebase initialized");
        } catch(e) {
            console.warn("Init error: ", e);
        }
    }
    const db = firebase.database();
    const auth = firebase.auth();
    
    // Disable persistence to avoid issues on some browsers
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(e=>console.log(e));

    // ---------- GLOBAL STATE ----------
    let currentUser = null;
    let userData = null;
    let userBalance = 0;
    let currentPage = 'home';
    let activeGameListener = null; // for game panel

    // Helper paths
    const getUserBalanceRef = (uid) => db.ref(`balances/${uid}`);
    const getUsersRef = () => db.ref('users');
    const getTransactionsRef = (uid) => db.ref(`transactions/${uid}`);
    
    // Helper: Show toast
    function showToast(msg, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.style.background = isError ? '#FF3B5C' : '#1E2A3A';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }

    // Game logic processor (Enhanced with realistic randomness)
    function processGameResult(game, betAmount, selectedOption) {
        let win = false;
        let winAmount = 0;
        let multiplier = 1;
        
        switch(game) {
            case 'colorTrading':
                win = Math.random() > 0.48;
                multiplier = win ? 1.92 : 0;
                break;
            case 'mines':
                win = Math.random() > 0.35;
                multiplier = win ? 2.45 : 0;
                break;
            case 'keno':
                win = Math.random() > 0.42;
                multiplier = win ? 2.95 : 0;
                break;
            case 'balloon':
                win = Math.random() > 0.53;
                multiplier = win ? 1.68 : 0;
                break;
            case 'hotlineSlots':
                win = Math.random() > 0.6;
                multiplier = win ? 3.9 : 0;
                break;
            default: return { win: false, winAmount: 0, multiplier: 0 };
        }
        
        winAmount = betAmount * multiplier;
        
        if(win && currentUser) {
            let uid = currentUser.uid;
            // Update balance
            db.ref(`balances/${uid}/main`).transaction(b => (b || 0) + winAmount);
            db.ref(`transactions/${uid}`).push({ 
                type: 'game_win', 
                game: game, 
                amount: winAmount, 
                bet: betAmount,
                date: Date.now() 
            });
            // Update leaderboard daily (using simple winners path)
            db.ref(`leaderboard/daily/${uid}`).transaction(score => (score || 0) + winAmount);
            db.ref(`users/${uid}/totalWon`).transaction(t => (t || 0) + winAmount);
        } else if(!win && betAmount > 0 && currentUser) {
            let uid = currentUser.uid;
            db.ref(`balances/${uid}/main`).transaction(b => (b || 0) - betAmount);
            db.ref(`transactions/${uid}`).push({ 
                type: 'game_loss', 
                game: game, 
                amount: betAmount,
                date: Date.now() 
            });
        }
        
        return { win, winAmount, multiplier };
    }

    // Fetch user data (balance & profile) with error handling
    async function fetchUserData() {
        if(!currentUser) return;
        let uid = currentUser.uid;
        try {
            let snap = await db.ref(`users/${uid}`).once('value');
            userData = snap.val() || {};
            let balSnap = await db.ref(`balances/${uid}`).once('value');
            let balData = balSnap.val() || { main: 0, bonus: 0, cashback: 0 };
            userBalance = balData.main || 0;
            // Ensure user document has referralCode field
            if(!userData.referralCode) {
                let code = (currentUser.uid.slice(-6) + Math.floor(Math.random()*1000)).toUpperCase();
                await db.ref(`users/${uid}`).update({ referralCode: code });
                userData.referralCode = code;
            }
            // create default balance if missing
            if(!balSnap.val()) await db.ref(`balances/${uid}`).set({ main: 0, bonus: 0, cashback: 0 });
        } catch(e) {
            console.warn(e);
            userBalance = 0;
        }
    }

    // ========== UI RENDERING ==========
    const appRoot = document.getElementById('appRoot');

    function render() {
        if (!currentUser) {
            renderLoginScreen();
        } else {
            renderMainApp();
        }
    }

    // ---------- LOGIN SCREEN (Tiranga Theme) with working Recaptcha fix ----------
    function renderLoginScreen() {
        appRoot.innerHTML = `
            <div class="container" style="display:flex; flex-direction:column; justify-content:center; min-height:100vh;">
                <div class="glass-card" style="padding:32px 24px; text-align:center;">
                    <i class="fas fa-flag-checkered" style="font-size:4rem; color:var(--primary);"></i>
                    <h2 style="margin:16px 0; background:linear-gradient(135deg,#FF6B35,#FFD700); -webkit-background-clip:text; background-clip:text; color:transparent;">Tiranga Pro Ultra</h2>
                    <p style="color:var(--text-muted);">Next-Gen Gaming Platform</p>
                    
                    <div id="loginMethodToggle" style="display:flex; gap:12px; margin:20px 0;">
                        <button id="showMobileBtn" class="btn-primary" style="flex:1;">Mobile / OTP</button>
                        <button id="showEmailBtn" class="btn-primary" style="flex:1; background:#2A3350;">Email Login</button>
                    </div>
                    
                    <div id="loginMobilePanel">
                        <input type="tel" id="mobileNumber" placeholder="+91 9876543210" style="width:100%; padding:12px; border-radius:40px; margin:8px 0; background:#1E2438; border:none; color:white;">
                        <div id="recaptcha-container"></div>
                        <button id="sendOtpBtn" class="btn-primary" style="width:100%;">Send OTP</button>
                        <div id="otpSection" class="hide">
                            <input type="text" id="otpCode" placeholder="Enter OTP" style="width:100%; padding:12px; border-radius:40px; margin:8px 0; background:#1E2438;">
                            <button id="verifyOtpBtn" class="btn-primary">Verify & Login</button>
                        </div>
                    </div>
                    
                    <div id="loginEmailPanel" class="hide">
                        <input type="email" id="loginEmail" placeholder="Email" style="width:100%; padding:12px; margin:8px 0; border-radius:40px; background:#1E2438; border:none; color:white;">
                        <input type="password" id="loginPassword" placeholder="Password" style="width:100%; padding:12px; margin:8px 0; border-radius:40px; background:#1E2438; border:none; color:white;">
                        <button id="signinEmailBtn" class="btn-primary" style="width:100%;">Sign In</button>
                        <button id="gotoSignupBtn" style="background:none; color:var(--primary); margin-top:12px; cursor:pointer;">Create New Account</button>
                    </div>
                    
                    <div id="signupPanel" class="hide">
                        <input type="email" id="signupEmail" placeholder="Email" style="width:100%; padding:12px; margin:8px 0; border-radius:40px; background:#1E2438; border:none; color:white;">
                        <input type="password" id="signupPass" placeholder="Password" style="width:100%; padding:12px; margin:8px 0; border-radius:40px; background:#1E2438; border:none; color:white;">
                        <input type="text" id="signupMobile" placeholder="Mobile Number" style="width:100%; padding:12px; margin:8px 0; border-radius:40px; background:#1E2438; border:none; color:white;">
                        <button id="createAccountBtn" class="btn-primary" style="width:100%;">Sign Up</button>
                    </div>
                    
                    <div style="margin-top:20px; font-size:0.8rem; color:var(--text-muted);">
                        <i class="fas fa-shield-alt"></i> Secure Platform | 24/7 Support
                    </div>
                </div>
            </div>
        `;
        
        // ReCAPTCHA container for phone auth
        let recaptchaContainer = document.getElementById('recaptcha-container');
        if(recaptchaContainer) {
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                size: 'invisible',
                callback: () => {}
            });
        }
        
        document.getElementById('showMobileBtn')?.addEventListener('click',()=>{
            document.getElementById('loginMobilePanel').classList.remove('hide');
            document.getElementById('loginEmailPanel').classList.add('hide');
            document.getElementById('signupPanel').classList.add('hide');
        });
        
        document.getElementById('showEmailBtn')?.addEventListener('click',()=>{
            document.getElementById('loginMobilePanel').classList.add('hide');
            document.getElementById('loginEmailPanel').classList.remove('hide');
            document.getElementById('signupPanel').classList.add('hide');
        });
        
        document.getElementById('sendOtpBtn')?.addEventListener('click', async() => {
            let mobile = document.getElementById('mobileNumber').value;
            if(!mobile) return showToast('Enter mobile number', true);
            try {
                if(!window.recaptchaVerifier) {
                    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {size: 'invisible'});
                }
                let confirmation = await auth.signInWithPhoneNumber(mobile, window.recaptchaVerifier);
                window.confirmationResult = confirmation;
                document.getElementById('otpSection').classList.remove('hide');
                showToast('OTP sent successfully!');
            } catch(e) { showToast('Error: ' + e.message, true); console.error(e); }
        });
        
        document.getElementById('verifyOtpBtn')?.addEventListener('click', async() => {
            let code = document.getElementById('otpCode').value;
            if(window.confirmationResult) {
                try {
                    let res = await window.confirmationResult.confirm(code);
                    if(res.user) {
                        currentUser = res.user;
                        await fetchUserData();
                        render();
                    }
                } catch(e) { showToast('Invalid OTP', true); }
            } else showToast('Send OTP first', true);
        });
        
        document.getElementById('signinEmailBtn')?.addEventListener('click', async() => {
            let email = document.getElementById('loginEmail').value;
            let pwd = document.getElementById('loginPassword').value;
            if(!email || !pwd) return showToast('Enter credentials', true);
            try {
                let cred = await auth.signInWithEmailAndPassword(email, pwd);
                currentUser = cred.user;
                await fetchUserData();
                render();
            } catch(e) { showToast('Login failed: ' + e.message, true); }
        });
        
        document.getElementById('gotoSignupBtn')?.addEventListener('click', () => {
            document.getElementById('signupPanel').classList.remove('hide');
            document.getElementById('loginEmailPanel').classList.add('hide');
        });
        
        document.getElementById('createAccountBtn')?.addEventListener('click', async() => {
            let email = document.getElementById('signupEmail').value;
            let pwd = document.getElementById('signupPass').value;
            let mobile = document.getElementById('signupMobile').value;
            if(!email || !pwd) return showToast('Email & password required', true);
            try {
                let userCred = await auth.createUserWithEmailAndPassword(email, pwd);
                let uid = userCred.user.uid;
                let refCode = (uid.slice(-6) + Math.floor(Math.random()*10000)).toUpperCase();
                await db.ref(`users/${uid}`).set({ 
                    email, mobile, createdAt: Date.now(), 
                    role: 'user', vip: 0, balance: 0, referralCode: refCode, totalWon: 0
                });
                await db.ref(`balances/${uid}`).set({ main: 500, bonus: 0, cashback: 0 }); // welcome bonus
                currentUser = userCred.user;
                await fetchUserData();
                render();
                showToast('Account created! Welcome bonus ₹500!');
            } catch(e) { showToast('Signup error: ' + e.message, true); }
        });
    }

    // ========== MAIN APP DASHBOARD ==========
    function renderMainApp() {
        let uid = currentUser?.uid;
        let walletMain = userBalance;
        let vipLevel = userData?.vip || 0;
        
        let pageContent = '';
        if(currentPage === 'home') pageContent = renderHomePage();
        else if(currentPage === 'games') pageContent = renderGamesPage();
        else if(currentPage === 'wallet') pageContent = renderWalletPage();
        else if(currentPage === 'leaderboard') pageContent = renderLeaderboardPage();
        else if(currentPage === 'profile') pageContent = renderProfilePage();

        appRoot.innerHTML = `
            <div class="container">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <i class="fas fa-crown" style="color:var(--gold); font-size:1.4rem;"></i> 
                        <strong style="font-size:1.2rem;">Tiranga Pro</strong>
                    </div>
                    <div class="balance-chip">
                        <i class="fas fa-wallet"></i> 
                        ₹<span id="liveWallet">${walletMain}</span>
                    </div>
                    <div>
                        <i class="fas fa-bell"></i> 
                        <span class="vip-badge">VIP ${vipLevel}</span>
                    </div>
                </div>
                <div id="dynamicPage">${pageContent}</div>
            </div>
            <div class="bottom-nav">
                <div class="nav-item ${currentPage==='home'?'active':''}" data-nav="home">
                    <i class="fas fa-home"></i><span>Home</span>
                </div>
                <div class="nav-item ${currentPage==='games'?'active':''}" data-nav="games">
                    <i class="fas fa-dice-d6"></i><span>Games</span>
                </div>
                <div class="nav-item ${currentPage==='wallet'?'active':''}" data-nav="wallet">
                    <i class="fas fa-coins"></i><span>Wallet</span>
                </div>
                <div class="nav-item ${currentPage==='leaderboard'?'active':''}" data-nav="leaderboard">
                    <i class="fas fa-chart-line"></i><span>Leaderboard</span>
                </div>
                <div class="nav-item ${currentPage==='profile'?'active':''}" data-nav="profile">
                    <i class="fas fa-user"></i><span>Profile</span>
                </div>
            </div>
        `;
        
        document.querySelectorAll('.nav-item').forEach(el => {
            let nav = el.getAttribute('data-nav');
            if(nav) el.addEventListener('click', () => { 
                currentPage = nav; 
                render(); 
            });
        });
        
        if(uid) {
            getUserBalanceRef(uid).on('value', (snap) => {
                let val = snap.val() || {};
                let newBal = val.main || 0;
                userBalance = newBal;
                let walletSpan = document.getElementById('liveWallet');
                if(walletSpan) walletSpan.innerText = newBal;
            });
        }
        
        setTimeout(attachPageSpecificEvents, 150);
    }

    // Home Page HTML
    function renderHomePage() {
        return `
            <div class="glass-card banner-slide animate-card" style="margin-bottom:16px; text-align:center;">
                <i class="fas fa-gift" style="font-size:2rem; color:var(--gold);"></i>
                <h3>Welcome Bonus 50%</h3>
                <p>Get upto ₹5000 on first deposit</p>
            </div>
            <div class="marquee">
                <i class="fas fa-bullhorn"></i> 🎉 New Year Bonanza! Daily cashback 10% | Refer & Earn ₹200 | Limited Period Offer
            </div>
            <div style="display:flex; gap:12px; margin:16px 0;">
                <div class="stat-card" style="flex:1;"><i class="fas fa-users"></i><div>Active Players</div><strong>1,234+</strong></div>
                <div class="stat-card" style="flex:1;"><i class="fas fa-trophy"></i><div>Today's Winners</div><strong>456</strong></div>
            </div>
            <h3 style="margin:16px 0 8px 0;"><i class="fas fa-fire" style="color:var(--primary);"></i> Trending Games</h3>
            <div class="game-grid">
                <div class="game-card" data-game="colorTrading"><i class="fas fa-chart-line"></i><div>Color Trading</div><small style="color:var(--gold);">🔥 Hot</small></div>
                <div class="game-card" data-game="mines"><i class="fas fa-bomb"></i><div>Mines</div><small>2.5x Multiplier</small></div>
                <div class="game-card" data-game="keno"><i class="fas fa-dice"></i><div>Keno</div><small>3x Jackpot</small></div>
                <div class="game-card" data-game="balloon"><i class="fas fa-futbol"></i><div>Balloon</div><small>1.7x</small></div>
                <div class="game-card" data-game="hotlineSlots"><i class="fas fa-slot-machine"></i><div>Hotline Slots</div><small>4x Mega Win</small></div>

    async function quickGamePlay(game) {
        if(!currentUser) return;
        let betAmount = 100;
        if(userBalance < betAmount) { showToast("Insufficient balance!", true); return; }
        let { win, winAmount } = processGameResult(game, betAmount, null);
        if(win) showToast(`🎉 You won ₹${winAmount.toFixed(2)} in ${game}!`, false);
        else showToast(`😞 You lost ₹${betAmount} in ${game}. Try again!`, true);
    }
    
    async function openGamePanel(game) {
        let panelDiv = document.getElementById('gameBetPanel');
        if(!panelDiv) return;
        panelDiv.innerHTML = `
            <div class="bet-panel">
                <h4>${game.toUpperCase()} - Place Bet</h4>
                <input type="number" id="betAmountInput" class="bet-input" placeholder="Enter amount" value="100" min="10">
                <div><button id="executeGameBtn" class="btn-primary" style="width:100%;">Play Now</button></div>
                <div id="gameSpecificResult"></div>
            </div>
        `;
        document.getElementById('executeGameBtn')?.addEventListener('click', async () => {
            let amount = parseFloat(document.getElementById('betAmountInput')?.value);
            if(isNaN(amount) || amount < 10) return showToast("Min bet ₹10", true);
            if(amount > userBalance) return showToast("Insufficient balance", true);
            let { win, winAmount } = processGameResult(game, amount, null);
            let resultDiv = document.getElementById('gameSpecificResult');
            if(win) resultDiv.innerHTML = `<div class="result-win">🎉 WIN! You won ₹${winAmount.toFixed(2)}</div>`;
            else resultDiv.innerHTML = `<div class="result-lose">💔 LOSS! You lost ₹${amount}</div>`;
            setTimeout(()=>{ if(resultDiv) resultDiv.innerHTML = ''; }, 3000);
        });
    }
